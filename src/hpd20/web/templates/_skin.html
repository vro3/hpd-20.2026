{#
  HPD-20 pad skin. Each pad is a clickable SVG link: in normal mode it
  HTMX-swaps the pad editor (`data-pad-click`); in swap mode swap.js
  intercepts the click to collect two pads and POST the swap.
#}
<svg viewBox="0 0 {{ skin_view_w }} {{ skin_view_h }}" class="hpd-skin" role="img" aria-label="HPD-20 pad layout">
    <defs>
        <radialGradient id="discGrad" cx="50%" cy="45%" r="65%">
            <stop offset="0%" stop-color="#dcdfe3"/>
            <stop offset="90%" stop-color="#a7acb2"/>
            <stop offset="100%" stop-color="#8b9097"/>
        </radialGradient>
        <linearGradient id="caseGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3a3f45"/>
            <stop offset="100%" stop-color="#21242a"/>
        </linearGradient>
    </defs>

    <rect x="5" y="5" width="{{ skin_view_w - 10 }}" height="{{ skin_view_h - 10 }}"
          rx="36" fill="url(#caseGrad)" stroke="#0a0b0c" stroke-width="3"/>

    <rect x="20" y="80" width="{{ skin_view_w - 40 }}" height="16" fill="#0e0f11"/>
    <text x="40" y="93" fill="#e5a72c" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Roland HPD-20</text>
    <text x="{{ skin_view_w - 40 }}" y="93" fill="#888" font-family="Arial, sans-serif" font-size="12" text-anchor="end">HandSonic</text>

    <circle cx="500" cy="555" r="430" fill="#f5f5f5" stroke="#0a0b0c" stroke-width="2"/>
    <circle cx="500" cy="555" r="412" fill="url(#discGrad)"/>
    <circle cx="500" cy="555" r="310" fill="none" stroke="#8b9097" stroke-width="1.5"/>
    <line x1="500" y1="245" x2="500" y2="865" stroke="#8b9097" stroke-width="1.5"/>
    <line x1="190" y1="555" x2="810" y2="555" stroke="#8b9097" stroke-width="1.5"/>

    {% macro pad_link(kit_index, slot) %}
        hx-get="/kit/{{ kit_index }}/pad/{{ slot }}"
        hx-target="#pad-editor"
        hx-swap="innerHTML"
        hx-push-url="/kit/{{ kit_index }}/pad/{{ slot }}"
        href="/kit/{{ kit_index }}/pad/{{ slot }}"
        data-pad-slot="{{ slot }}"
    {% endmacro %}

    {# M quadrants — slots 0..3 #}
    {% for p in pads if p.shape == 'wedge' and p.family == 'main' %}
        <a {{ pad_link(kit_index, p.slot) }}>
            <path d="{{ p.path }}"
                  class="pad pad-main {{ 'on' if p.active else 'off' }} {{ 'selected' if p.selected else '' }}"/>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y - 28) }}"
                  text-anchor="middle" class="pad-label">{{ p.name }}</text>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y - 8) }}"
                  text-anchor="middle" class="pad-instr">{{ p.patch_short }}</text>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y + 10) }}"
                  text-anchor="middle" class="pad-note">{{ p.note_a }}</text>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y + 26) }}"
                  text-anchor="middle" class="pad-vol">v{{ p.volume_a }}</text>
            <title>{{ p.name }} · {{ p.patch_name }}</title>
        </a>
    {% endfor %}

    {# M5 centre — slot 4 #}
    {% for p in pads if p.shape == 'circle' %}
        <a {{ pad_link(kit_index, p.slot) }}>
            <circle cx="{{ p.cx }}" cy="{{ p.cy }}" r="{{ p.r }}"
                    class="pad pad-center {{ 'on' if p.active else 'off' }} {{ 'selected' if p.selected else '' }}"/>
            <text x="{{ p.label_x }}" y="{{ '%.1f'|format(p.label_y - 18) }}"
                  text-anchor="middle" class="pad-label-small">{{ p.name }}</text>
            <text x="{{ p.label_x }}" y="{{ '%.1f'|format(p.label_y - 4) }}"
                  text-anchor="middle" class="pad-instr-small">{{ p.patch_short }}</text>
            <text x="{{ p.label_x }}" y="{{ '%.1f'|format(p.label_y + 12) }}"
                  text-anchor="middle" class="pad-note-small">{{ p.note_a }}</text>
            <title>{{ p.name }} · {{ p.patch_name }}</title>
        </a>
    {% endfor %}

    {# S wedges — slots 5..12 #}
    {% for p in pads if p.shape == 'wedge' and p.family == 'side' %}
        <a {{ pad_link(kit_index, p.slot) }}>
            <path d="{{ p.path }}"
                  class="pad pad-side {{ 'on' if p.active else 'off' }} {{ 'selected' if p.selected else '' }}"/>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y - 10) }}"
                  text-anchor="middle" class="pad-label-small">{{ p.name }}</text>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y + 3) }}"
                  text-anchor="middle" class="pad-instr-tiny">{{ p.patch_short }}</text>
            <text x="{{ '%.1f'|format(p.label_x) }}" y="{{ '%.1f'|format(p.label_y + 15) }}"
                  text-anchor="middle" class="pad-note-small">{{ p.note_a }}</text>
            <title>{{ p.name }} · {{ p.patch_name }}</title>
        </a>
    {% endfor %}

    {# Aux triggers — slots 13..16 #}
    <text x="20" y="20" fill="#888" font-family="Arial,sans-serif" font-size="11">AUX TRIGGERS</text>
    {% for p in pads if p.shape == 'rect' %}
        <a {{ pad_link(kit_index, p.slot) }}>
            <rect x="{{ p.x }}" y="{{ p.y }}" width="{{ p.w }}" height="{{ p.h }}" rx="6"
                  class="pad pad-aux {{ 'on' if p.active else 'off' }} {{ 'selected' if p.selected else '' }}"/>
            <text x="{{ p.label_x }}" y="{{ '%.1f'|format(p.label_y - 3) }}"
                  text-anchor="middle" class="pad-label-aux">{{ p.name }}</text>
            <text x="{{ p.label_x }}" y="{{ '%.1f'|format(p.label_y + 10) }}"
                  text-anchor="middle" class="pad-instr-aux">{{ p.patch_short }}</text>
            <title>{{ p.name }} · {{ p.patch_name }}</title>
        </a>
    {% endfor %}

    {# Play buttons — rendered last so they're on top of the pad <a> regions.
       Each has its own click handler in midi.js that triggers
       POST /api/midi/play/{k}/{slot}, stops propagation so the <a>
       navigation doesn't fire. #}
    {% for p in pads %}
        <g class="play-btn"
           data-pad-slot="{{ p.slot }}"
           data-kit-index="{{ kit_index }}"
           role="button"
           tabindex="0"
           aria-label="play {{ p.name }}">
            <circle cx="{{ '%.1f'|format(p.play_x) }}" cy="{{ '%.1f'|format(p.play_y) }}" r="18"
                    class="play-btn-bg"/>
            <polygon points="{{ '%.1f,%.1f %.1f,%.1f %.1f,%.1f'|format(
                        p.play_x - 6, p.play_y - 8,
                        p.play_x - 6, p.play_y + 8,
                        p.play_x + 8, p.play_y) }}"
                     class="play-btn-icon"/>
            <title>Play {{ p.name }} ({{ p.patch_name }})</title>
        </g>
    {% endfor %}
</svg>
